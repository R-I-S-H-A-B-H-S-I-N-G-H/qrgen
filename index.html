<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro QR Designer | 2026 Edition</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --bg-page: #fdfdff;
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: grid;
            grid-template-columns: 380px auto;
            gap: 2rem;
            background: white;
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            max-width: 1000px;
            width: 95%;
        }
        .controls { display: flex; flex-direction: column; gap: 1.2rem; }
        .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-weight: 700; font-size: 0.85rem; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); }
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .preview-box {
            background: #f8fafc;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border: 1px dashed #cbd5e1;
        }
        #canvas { padding: 15px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; grid-column: span 2; }
        .btn-download { background: #0f172a; color: white; }
        .btn-svg { background: #f1f5f9; color: #0f172a; }
        .btn:active { transform: scale(0.98); }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2 style="margin: 0 0 0.5rem 0;">QR Designer</h2>
        
        <div class="control-group">
            <label>Location / URL</label>
            <input type="text" id="qr-data" value="https://google.com" placeholder="Paste link here...">
        </div>

        <div class="color-row">
            <div class="control-group">
                <label>Dots Color</label>
                <input type="color" id="color-dots" value="#6366f1">
            </div>
            <div class="control-group">
                <label>Background</label>
                <input type="color" id="color-bg" value="#ffffff">
            </div>
        </div>

        <div class="control-group">
            <label>Dot Style</label>
            <select id="dot-style">
                <option value="rounded">Rounded Dots</option>
                <option value="extra-rounded">Liquid Blocks</option>
                <option value="classy">Classy (Diamond)</option>
                <option value="dots">Circular Dots</option>
                <option value="square" selected>Standard Square</option>
            </select>
        </div>

        <div class="control-group">
            <label>Corner Eye Style</label>
            <select id="eye-style">
                <option value="extra-rounded">Organic Circle</option>
                <option value="rounded">Soft Rounded</option>
                <option value="square" selected>Classic Square</option>
            </select>
        </div>

        <div class="control-group">
            <label>Center Logo</label>
            <input type="file" id="logo-file" accept="image/*">
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="updateQR()">Refresh Designer</button>
            <button class="btn btn-download" onclick="download('png')">Download PNG</button>
            <button class="btn btn-svg" onclick="download('svg')">Export SVG</button>
        </div>
    </div>

    <div class="preview-panel">
        <div class="preview-box">
            <div id="canvas"></div>
            <p style="color: #94a3b8; font-size: 0.8rem; margin-top: 1.5rem; font-weight: 500;">LIVE PREVIEW</p>
        </div>
    </div>
</div>

<script type="text/javascript">
    const qrCode = new QRCodeStyling({
        width: 320,
        height: 320,
        type: "svg",
        data: "https://google.com",
        image: "",
        dotsOptions: { color: "#6366f1", type: "square" },
        backgroundOptions: { color: "#ffffff" },
        cornersSquareOptions: { type: "square" },
        imageOptions: { crossOrigin: "anonymous", margin: 8 }
    });

    qrCode.append(document.getElementById("canvas"));

    function updateQR() {
        const fileInput = document.getElementById("logo-file");
        const options = {
            data: document.getElementById("qr-data").value,
            dotsOptions: {
                color: document.getElementById("color-dots").value,
                type: document.getElementById("dot-style").value
            },
            backgroundOptions: {
                color: document.getElementById("color-bg").value,
            },
            cornersSquareOptions: {
                type: document.getElementById("eye-style").value,
                color: document.getElementById("color-dots").value // Keeps eyes matching dots
            }
        };

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                options.image = e.target.result;
                qrCode.update(options);
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            qrCode.update(options);
        }
    }

    function download(ext) {
        qrCode.download({ name: "designer-qr", extension: ext });
    }

    // Dynamic Updates
    document.querySelectorAll('input:not([type="file"]), select').forEach(el => {
        el.addEventListener('change', updateQR);
    });
</script>

</body>
</html>
